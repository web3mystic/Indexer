version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: cosmos-indexer-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cosmos_indexer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - indexer-network

  # Cosmos Indexer
  indexer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cosmos-indexer
    environment:
      # Blockchain
      GRPC_ENDPOINT: ${GRPC_ENDPOINT:-localhost:9090}
      CHAIN_ID: ${CHAIN_ID:-cosmoshub-4}
      
      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: cosmos_indexer
      
      # Indexer Settings
      START_HEIGHT: ${START_HEIGHT:-1}
      BATCH_SIZE: ${BATCH_SIZE:-100}
      WORKER_COUNT: ${WORKER_COUNT:-4}
      RETRY_ATTEMPTS: ${RETRY_ATTEMPTS:-3}
      RETRY_DELAY_MS: ${RETRY_DELAY_MS:-1000}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - indexer-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # PgAdmin (optional, for database management)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cosmos-indexer-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - indexer-network
    profiles:
      - dev

volumes:
  postgres_data:
    driver: local

networks:
  indexer-network:
    driver: bridge
